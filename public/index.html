<body>
    <!-- Prevent flash of wrong theme on load -->
    <script>
      (function() {
        try {
          var p = localStorage.getItem('theme-pref');
          var t = p === 'light' ? 'light'
                : p === 'dark'  ? 'dark'
                : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', t);
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
</body>
